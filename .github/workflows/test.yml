name: Test Badge Maker
on: [push, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Test the action
        uses: ./
        with:
          text: 'Tested'
          color: 'green'
      
      - name: Show result
        run: |
          echo "✅ Badge action executed successfully!"
          cat README.md
